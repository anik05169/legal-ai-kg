name: Legal AI — Index + Evaluate Retrieval

on:
  workflow_dispatch:
    inputs:
      samples:
        description: "Number of evaluation queries"
        required: false
        default: "100"
      query:
        description: "Test query to run against RAG pipeline"
        required: false
        default: "what is breach of contract"

jobs:
  retrieval-pipeline:
    runs-on: ubuntu-latest

    steps:

    # ============================================================
    # CHECKOUT
    # ============================================================

    - name: Checkout Repository
      uses: actions/checkout@v4

    # ============================================================
    # PYTHON SETUP
    # ============================================================

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    # ============================================================
    # INSTALL DEPENDENCIES
    # ============================================================

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ============================================================
    # CACHE HUGGINGFACE MODELS
    # ============================================================

    - name: Cache Hugging Face models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-models

    # ============================================================
    # INDEX DOCUMENTS INTO MONGODB
    # ============================================================

    - name: Run MongoDB Indexing Pipeline
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        python index_to_mongodb.py

    # ============================================================
    # RUN MINIMAL RETRIEVAL EVALUATION
    # ============================================================

    - name: Run Minimal Retrieval Evaluation
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        python evaluate_retrieval_minimal.py

    # ============================================================
    # TEST RAG PIPELINE WITH USER QUERY (GROQ)
    # ============================================================

    - name: Run RAG Pipeline Test Query
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python test_rag_pipeline.py --query "${{ github.event.inputs.query }}"

    # ============================================================
    # OPTIONAL REPORT UPLOAD
    # ============================================================

    - name: Upload evaluation reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: retrieval-evaluation-results
        path: reports/
        retention-days: 30