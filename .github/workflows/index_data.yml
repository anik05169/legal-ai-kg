name: Legal AI — Evaluate Retrieval

on:
  # Manual trigger from the Actions tab on GitHub
  workflow_dispatch:
    inputs:
      samples:
        description: "Number of QA pairs to evaluate"
        required: false
        default: "100"
      mode:
        description: "Query mode (raw / clean / both)"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - raw
          - clean

jobs:
  evaluate-retrieval:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Cache Hugging Face models so that subsequent runs are extremely fast
    - name: Cache Hugging Face models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-models

    - name: Run Retrieval Evaluation
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        python evaluate_retrieval.py \
          --samples ${{ github.event.inputs.samples }} \
          --mode ${{ github.event.inputs.mode }}

    - name: Upload evaluation report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: retrieval-eval-report
        path: reports/
        retention-days: 30
