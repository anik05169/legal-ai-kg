name: Index CUAD to MongoDB Atlas

on:
  # Allows you to run this workflow manually from the Actions tab on GitHub
  workflow_dispatch:

jobs:
  index-to-cloud-db:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "pymongo[srv]" "datasets<3.0" sentence-transformers torch certifi

    # Cache Hugging Face models so that subsequent runs are extremely fast
    - name: Cache Hugging Face models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-models

    - name: Run Benchmarking & Indexing Script
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        python benchmark.py

