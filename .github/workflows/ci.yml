name: Legal AI — RAG Pipeline Test

on:
  # Allows you to run this workflow manually from the Actions tab on GitHub
  workflow_dispatch:

jobs:
  test-rag:
    runs-on: ubuntu-latest

    steps:
    # ============================================================
    # CHECKOUT
    # ============================================================
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ============================================================
    # PYTHON SETUP
    # ============================================================
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    # ============================================================
    # INSTALL DEPENDENCIES
    # ============================================================
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ============================================================
    # CACHE HUGGINGFACE MODELS (for fast embedding loading)
    # ============================================================
    - name: Cache Hugging Face models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-models

    # ============================================================
    # TEST RAG STANDALONE PIPELINE (GROQ LLM)
    # ============================================================
    - name: Run Standalone RAG Pipeline Test
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python tests/test_rag_pipeline.py --query "what is breach of contract"

    # ============================================================
    # RUN RAGAS BENCHMARK EVALUATION
    # ============================================================
    - name: Run RAG Pipeline Benchmark Evaluation
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python -u tests/run_benchmark_rag.py

    # ============================================================
    # UPLOAD EVALUATION REPORTS
    # ============================================================
    - name: Upload Benchmark Metrics Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: legal-ai-benchmark-report
        path: reports/
        retention-days: 30

